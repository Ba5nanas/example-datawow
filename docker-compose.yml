version: '3.8'

services:

# Redis Service (Added)
  redis:
    image: redis:7-alpine
    container_name: concert-redis-dev
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - backend-network
    restart: unless-stopped

  # Backend Service (Development Mode)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: concert-backend-dev
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USERNAME=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=concert_db
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
    depends_on:
      - postgres
    networks:
      - backend-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: concert-postgres-dev
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=concert_db
    volumes:
      - postgres-data2:/var/lib/postgresql/data
    networks:
      - backend-network
    restart: unless-stopped

  # Frontend Service (Development Mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: concert-frontend-dev
    ports:
      - "5001:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://backend:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/next.config.ts:/app/next.config.ts
    depends_on:
      - backend
    networks:
      - backend-network
    restart: unless-stopped

# Networks
networks:
  backend-network:
    driver: bridge

# Volumes
volumes:
  postgres-data2:
    driver: local
  redis-data:
    driver: local
